<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YZ Tool - Premium</title>
    <script src="./abcd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        :root {
            --cyan-glow: #00f0ff;
            --purple-glow: #b026ff;
            --green-glow: #00ff66;
            --glass-bg: rgba(20, 25, 45, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* Animated Moving Background */
            background: linear-gradient(-45deg, #050814, #120b2e, #0a1b3a, #11092c);
            background-size: 400% 400%;
            animation: liquidBG 12s ease-in-out infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        /* Keyframes for Background Animation */
        @keyframes liquidBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Logo Section */
        .header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 5px;
            padding-left: 5px;
        }
        
        /* CSS Logo resembling the screenshot */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .yz-icon {
            font-size: 2.2rem;
            font-weight: 800;
            font-style: italic;
            /* Gradient Outline Trick */
            color: transparent;
            -webkit-text-stroke: 1.5px transparent;
            background: linear-gradient(135deg, var(--cyan-glow), var(--purple-glow));
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(176, 38, 255, 0.6));
            letter-spacing: 1px;
        }
        .yz-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e0e8f5;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* Engine Loader */
        .engine-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--cyan-glow);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            font-weight: 600;
            margin-top: -10px;
        }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-top-color: var(--cyan-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .engine-ready { color: var(--green-glow) !important; text-shadow: 0 0 10px rgba(0, 255, 102, 0.4) !important; }

        /* Glass Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.3s;
        }

        /* Upload Section (Cyan Theme) */
        .upload-card {
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.05), 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 240, 255, 0.2);
            text-align: center;
        }
        .upload-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .upload-btn {
            border: 1.5px solid var(--cyan-glow);
            background: rgba(0, 240, 255, 0.05);
            color: var(--text-main);
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .upload-btn:hover { background: rgba(0, 240, 255, 0.12); box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%;
        }

        /* Video Preview & Data */
        #videoPreviewContainer {
            display: none;
            margin-top: 18px;
            animation: fadeIn 0.4s;
        }
        video {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .video-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .video-data span { color: #fff; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Toggles Section */
        .toggle-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
        }
        
        /* Cyan Outline for Ultra Smooth */
        .ultra-smooth-card {
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.05), 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Purple Outline for YZ Method */
        .yz-method-card {
            border: 1px solid rgba(176, 38, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.08), 0 5px 15px rgba(0,0,0,0.3);
        }

        .toggle-title { font-size: 1.05rem; font-weight: 600; }
        
        /* Neon Switch */
        .switch { position: relative; display: inline-block; width: 54px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background-color: #fff; transition: .4s; border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Cyan Switch Config */
        input.cyan-switch:checked + .slider { background-color: rgba(0, 240, 255, 0.3); border-color: var(--cyan-glow); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        input.cyan-switch:checked + .slider:before { transform: translateX(24px); box-shadow: 0 0 10px var(--cyan-glow); }

        /* Purple Switch Config */
        input.purple-switch:checked + .slider { background-color: rgba(176, 38, 255, 0.4); border-color: var(--purple-glow); box-shadow: 0 0 15px rgba(176, 38, 255, 0.4); }
        input.purple-switch:checked + .slider:before { transform: translateX(24px); box-shadow: 0 0 10px var(--purple-glow); }

        /* Process Button (Green Theme) */
        .process-btn {
            background: linear-gradient(90deg, #00ff66, #00cc55);
            color: #000;
            font-size: 1.15rem;
            font-weight: 700;
            border: none;
            padding: 18px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.3);
            transition: 0.3s;
            width: 100%;
            margin-top: 5px;
        }
        .process-btn:hover { transform: scale(1.02); box-shadow: 0 0 35px rgba(0, 255, 102, 0.5); }
        .process-btn:disabled { background: rgba(255,255,255,0.1); color: #666; box-shadow: none; cursor: not-allowed; transform: none; border: 1px solid rgba(255,255,255,0.1); }

        /* Progress Area */
        .progress-container { display: none; margin-top: 15px; text-align: center; }
        .progress-text { color: var(--green-glow); font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; text-shadow: 0 0 10px rgba(0,255,102,0.4); }
        progress { width: 100%; height: 8px; border-radius: 4px; overflow: hidden; -webkit-appearance: none; background: rgba(255,255,255,0.1); }
        progress::-webkit-progress-bar { background-color: transparent; }
        progress::-webkit-progress-value { background-color: var(--green-glow); box-shadow: 0 0 10px var(--green-glow); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="logo-container">
                <span class="yz-icon">YZ</span>
                <span class="yz-text">YZ tool</span>
            </div>
        </div>

        <div class="engine-status" id="engineStatus">
            <div class="spinner" id="spinner"></div>
            <span id="statusText">Loading YZ Engine...</span>
        </div>

        <div class="card upload-card">
            <div class="upload-title">Upload Your Content</div>
            <div class="upload-btn-wrapper">
                <button class="upload-btn">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Select video
                </button>
                <input type="file" id="videoUploader" accept="video/*">
            </div>

            <div id="videoPreviewContainer">
                <video id="videoPlayer" controls></video>
                <div class="video-data">
                    <div>Size: <span id="v-size">-</span></div>
                    <div>Dur: <span id="v-dur">-</span></div>
                    <div>Res: <span id="v-res">-</span></div>
                    <div>Bitrate: <span id="v-bit">-</span></div>
                </div>
            </div>
        </div>

        <div class="card toggle-card ultra-smooth-card">
            <span class="toggle-title">Ultra Smooth</span>
            <label class="switch">
                <input type="checkbox" id="ultraSmoothToggle" class="cyan-switch">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card toggle-card yz-method-card">
            <span class="toggle-title">YZ method 60 fps</span>
            <label class="switch">
                <input type="checkbox" id="yzMethodToggle" class="purple-switch" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div>
            <button class="process-btn" id="startBtn" onclick="startProcess()" disabled>Process video</button>
            <div class="progress-container" id="progressBox">
                <div class="progress-text" id="progressText">Processing: 0%</div>
                <progress id="progressBar" value="0" max="100"></progress>
            </div>
        </div>

    </div>

    <script>
        let isEngineLoaded = false;
        let ffmpeg = null;
        let selectedFile = null;

        const startBtn = document.getElementById('startBtn');
        const ultraSmoothToggle = document.getElementById('ultraSmoothToggle');
        const yzMethodToggle = document.getElementById('yzMethodToggle');
        const uploader = document.getElementById('videoUploader');
        const videoPlayer = document.getElementById('videoPlayer');
        const previewContainer = document.getElementById('videoPreviewContainer');

        // 1. Engine Loading Logic
        window.onload = async () => {
            const { createFFmpeg } = FFmpeg;
            ffmpeg = createFFmpeg({ log: false });

            ffmpeg.setProgress(({ ratio }) => {
                let percent = Math.round(ratio * 100);
                if(percent < 0) percent = 0; if(percent > 100) percent = 100;
                document.getElementById('progressBar').value = percent;
                document.getElementById('progressText').innerText = `Processing: ${percent}%`;
            });

            try {
                await ffmpeg.load();
                isEngineLoaded = true;
                document.getElementById('spinner').style.display = 'none';
                const status = document.getElementById('statusText');
                status.innerText = "✓ YZ Engine Ready";
                status.classList.add("engine-ready");
                if(selectedFile) startBtn.disabled = false;
            } catch (error) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').innerText = "Engine Load Failed!";
                document.getElementById('statusText').style.color = "red";
            }
        };

        // 2. JS Video Metadata & Preview (No FFmpeg)
        uploader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            selectedFile = file;

            if(isEngineLoaded) startBtn.disabled = false;

            previewContainer.style.display = 'block';

            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            document.getElementById('v-size').innerText = `${sizeMB} MB`;

            const fileURL = URL.createObjectURL(file);
            videoPlayer.src = fileURL;

            videoPlayer.onloadedmetadata = function() {
                document.getElementById('v-res').innerText = `${videoPlayer.videoWidth}x${videoPlayer.videoHeight}`;
                
                const mins = Math.floor(videoPlayer.duration / 60);
                const secs = Math.floor(videoPlayer.duration % 60);
                document.getElementById('v-dur').innerText = `${mins}m ${secs}s`;

                const bitrateKbps = Math.round((file.size * 8) / videoPlayer.duration / 1000);
                document.getElementById('v-bit').innerText = `${bitrateKbps} kbps`;
            }
        });

        // 3. Process Logic
        async function startProcess() {
            if(!isEngineLoaded || !selectedFile) return;
            
            startBtn.disabled = true;
            startBtn.innerText = "Engine Running...";
            startBtn.style.background = "rgba(0, 255, 102, 0.2)";
            startBtn.style.color = "#00ff66";
            document.getElementById('progressBox').style.display = 'block';
            document.getElementById('progressBar').value = 0;

            try {
                const { fetchFile } = FFmpeg;
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(selectedFile));

                let args = ['-i', 'input.mp4'];

                // Add Ultra Smooth filter if toggled
                if (ultraSmoothToggle.checked) {
                    args.push('-filter:v', 'framerate=fps=120:interp_start=0:interp_end=255:scene=82,tmix=frames=2:weights=1 1,fps=60');
                }

                // Apply high quality and fast processing settings
                args.push('-preset', 'ultrafast');
                args.push('-crf', '18');
                args.push('-c:a', 'copy');

                // Determine Output Format
                let outputFileName = 'output.mp4';
                if (yzMethodToggle.checked) {
                    outputFileName = 'output.ts';
                }

                args.push(outputFileName);

                // Run Engine
                await ffmpeg.run(...args);

                const data = ffmpeg.FS('readFile', outputFileName);
                
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `YZ_${selectedFile.name}`; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                startBtn.innerText = "Completed!";
                startBtn.style.background = "linear-gradient(90deg, #00cc55, #00ff66)";
                startBtn.style.color = "#000";

                try {
                    ffmpeg.FS('unlink', 'input.mp4');
                    ffmpeg.FS('unlink', outputFileName);
                } catch(e) {}

                setTimeout(() => {
                    startBtn.innerText = "Process video";
                    startBtn.style.background = "";
                    startBtn.style.color = "";
                    startBtn.disabled = false;
                    document.getElementById('progressBox').style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error(error);
                alert("Processing Error!");
                startBtn.innerText = "Process video";
                startBtn.style.background = "";
                startBtn.style.color = "";
                startBtn.disabled = false;
                document.getElementById('progressBox').style.display = 'none';
            }
        }
    </script>
</body>
</html>
